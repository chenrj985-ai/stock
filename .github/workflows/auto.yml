name: stock-watch

on:
  workflow_dispatch:
  schedule:
    # 北京时间 11:15，工作日
    - cron: "15 3 * * 1-5"

    # 北京时间 13:40，工作日
    - cron: "40 5 * * 1-5"

    # 北京时间 14:20，工作日
    - cron: "20 6 * * 1-5"

    # 北京时间 14:45，工作日
    - cron: "45 6 * * 1-5"

    # 北京时间 14:53，工作日
    - cron: "53 6 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai
      SITE_BASE_URL: https://chenrj985-ai.github.io/stock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pandas requests

      - name: Run stock script
        run: |
          mkdir -p docs/history
          python stockchoice.py

      - name: Save result copies and latest unique URL
        run: |
          mkdir -p docs/history

          LATEST_HISTORY_FILE=$(ls -t docs/history/*.html | head -n 1)
          LATEST_BASENAME=$(basename "$LATEST_HISTORY_FILE")

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cp docs/index.html docs/manual_latest.html
          else
            cp docs/index.html docs/schedule_latest.html
          fi

          echo "${SITE_BASE_URL}/history/${LATEST_BASENAME}" > docs/latest_url.txt

          cat > docs/latest.html << EOF
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
            <meta http-equiv="Pragma" content="no-cache">
            <meta http-equiv="Expires" content="0">
            <meta http-equiv="refresh" content="0; url=history/${LATEST_BASENAME}">
            <title>跳转到最新结果</title>
          </head>
          <body>
            <p>正在跳转到最新唯一结果页面：</p>
            <p><a href="history/${LATEST_BASENAME}">history/${LATEST_BASENAME}</a></p>
          </body>
          </html>
          EOF

      - name: Commit result to docs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update stock pages" || echo "No changes to commit"
          git push
