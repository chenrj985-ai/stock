name: stock-watch

on:
  workflow_dispatch:
  schedule:
    # 北京时间 11:15，工作日
    - cron: "15 3 * * 1-5"

    # 北京时间 13:40，工作日
    - cron: "40 5 * * 1-5"

    # 北京时间 14:20，工作日
    - cron: "20 6 * * 1-5"

    # 北京时间 14:45，工作日
    - cron: "45 6 * * 1-5"

    # 北京时间 14:53，工作日
    - cron: "53 6 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pandas requests urllib3 akshare

      - name: Run stock script
        run: |
          mkdir -p docs
          python stockchoice.py

      - name: Save result copies
        run: |
          mkdir -p docs/history

          NOW=$(TZ='Asia/Shanghai' date +'%Y%m%d_%H%M')
          cp docs/index.html docs/history/${NOW}.html

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cp docs/index.html docs/manual_latest.html
          else
            cp docs/index.html docs/schedule_latest.html
          fi

      - name: Commit result to docs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update stock pages" || echo "No changes to commit"
          git push
