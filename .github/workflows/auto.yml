name: Stock Watch

on:
  # 手动运行
  workflow_dispatch:

  # 自动运行（UTC时间）
  schedule:
    - cron: '18 3 * * 1-5'   # 北京11:18
    - cron: '40 5 * * 1-5'   # 北京13:40
    - cron: '20 6 * * 1-5'   # 北京14:20
    - cron: '40 6 * * 1-5'   # 北京14:40
    - cron: '50 6 * * 1-5'   # 北京14:50

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python stockchoice.py

      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/ stock_output/
          git commit -m "update stock page" || echo "No changes"

          git push
