name: stock-watch

on:
  workflow_dispatch:
  schedule:
    # 北京时间 11:15，工作日
    - cron: "15 3 * * 1-5"

    # 北京时间 13:40，工作日
    - cron: "40 5 * * 1-5"

    # 北京时间 14:20，工作日
    - cron: "20 6 * * 1-5"

    # 北京时间 14:45，工作日
    - cron: "38 6 * * 1-5"

    # 北京时间 14:53，工作日
    - cron: "49 6 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas akshare

      - name: Run stock script
        run: |
          mkdir -p docs
          python stockchoice.py

      - name: Commit result to docs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Update stock page" || echo "No changes to commit"
          git push
