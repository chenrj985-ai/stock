name: stock-watch

on:
  workflow_dispatch:
  schedule:
    # 工作日北京时间 11:00、11:20
    # UTC 03:00、03:20
    - cron: "0,20 3 * * 1-5"

    # 工作日北京时间 13:00、13:20、13:40、14:00、14:20
    # UTC 05:00、05:20、05:40、06:00、06:20
    - cron: "0,20,40 5 * * 1-5"
    - cron: "0,20 6 * * 1-5"

    # 工作日北京时间 14:30、14:40、14:50
    # UTC 06:30、06:40、06:50
    - cron: "30,40,50 6 * * 1-5"

    # 工作日北京时间 14:55，最后一次
    # UTC 06:55
    - cron: "55 6 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai
      SITE_BASE_URL: https://chenrj985-ai.github.io/stock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show current time
        run: |
          echo "UTC time:"
          date -u
          echo "Beijing time:"
          TZ='Asia/Shanghai' date

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pandas requests

      - name: Run stock script
        run: |
          mkdir -p docs/history
          python stockchoice.py

      - name: Save result copies and latest unique URL
        run: |
          mkdir -p docs/history

          # 找到本次 Python 生成的最新 history 页面
          LATEST_HISTORY_FILE=$(ls -t docs/history/*.html | head -n 1)
          LATEST_BASENAME=$(basename "$LATEST_HISTORY_FILE")

          # 手动运行时，保存为 manual_latest.html
          # 定时运行时，保存为 schedule_latest.html
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cp docs/index.html docs/manual_latest.html
          else
            cp docs/index.html docs/schedule_latest.html
          fi

          # 写入最新唯一网页地址
          echo "${SITE_BASE_URL}/history/${LATEST_BASENAME}" > docs/latest_url.txt

          # 生成固定入口 latest.html
          cat > docs/latest.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
            <meta http-equiv="Pragma" content="no-cache">
            <meta http-equiv="Expires" content="0">
            <title>跳转到最新股票结果</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", Arial, sans-serif;
                padding: 30px;
                line-height: 1.8;
              }
            </style>
          </head>
          <body>
            <h2>正在打开最新股票结果...</h2>
            <p>如果没有自动跳转，请稍等几秒后刷新。</p>

            <script>
              const t = Date.now();
              fetch('latest_url.txt?t=' + t, { cache: 'no-store' })
                .then(response => response.text())
                .then(url => {
                  const target = url.trim();
                  if (target) {
                    window.location.href = target + '?t=' + t;
                  } else {
                    document.body.innerHTML += '<p>latest_url.txt 为空，请重新运行 Actions。</p>';
                  }
                })
                .catch(error => {
                  document.body.innerHTML += '<p>读取 latest_url.txt 失败，请重新运行 Actions。</p>';
                  document.body.innerHTML += '<pre>' + error + '</pre>';
                });
            </script>
          </body>
          </html>
          EOF

          # 只保留最新这一个历史页面，删除其它旧页面
          find docs/history -type f -name "*.html" ! -name "${LATEST_BASENAME}" -delete

      - name: Commit result to docs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          git commit -m "Update stock pages" || echo "No changes to commit"
          git push
