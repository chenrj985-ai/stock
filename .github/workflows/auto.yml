name: Stock Watch

on:
  workflow_dispatch:

  schedule:
    - cron: '18 3 * * 1-5'
    - cron: '40 5 * * 1-5'
    - cron: '20 6 * * 1-5'
    - cron: '40 6 * * 1-5'
    - cron: '50 6 * * 1-5'

permissions:
  contents: write

concurrency:
  group: stock-watch
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python stockchoice.py

      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/ stock_output/
          git commit -m "update stock page" || echo "No changes"

          git push
