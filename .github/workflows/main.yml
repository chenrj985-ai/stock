name: stock-watch-tdx

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python packages
        run: |
          pip install -r requirements.txt

      - name: Run stock watch
        run: |
          python stockchoice.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: stock_output
          path: stock_output/
