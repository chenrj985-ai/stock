name: stock-watch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run stock script
        run: |
          python stockchoice.py

      - name: Build web page
        run: |
          mkdir -p docs
          cp stock_output/stock_watch.html docs/index.html
          cp stock_output/stock_watch.svg docs/latest.svg
          cp stock_output/stock_watch.txt docs/latest.txt
          cp stock_output/stock_watch.csv docs/latest.csv

      - name: Commit docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/index.html docs/latest.svg docs/latest.txt docs/latest.csv
          git commit -m "update web page" || echo "No changes"
          git push

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: stock_output
          path: stock_output/
