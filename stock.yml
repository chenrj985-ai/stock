name: stock-watch

on:
  workflow_dispatch:

jobs:
  run-stock-watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock script
        run: python stock_entry_watch_mainline_v21.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: stock-results
          path: results/
